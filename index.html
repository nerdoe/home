<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>
<link rel="icon" type="image/x-icon" href="/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d;--bg2:#0e0e16;--bg3:#141420;--bg4:#1c1c2c;--bg5:#22223a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#eeeef5;--text2:#8888aa;--text3:#44445a;
  --c:#ff3c6e;--cg:rgba(255,60,110,0.14);
  --l:#00d4ff;--lg:rgba(0,212,255,0.12);
  --accent:#ff3c6e;--accentg:rgba(255,60,110,0.14);
  --r:10px;--rl:14px;--sidebar:268px;--topbar:52px;
  --mono:'JetBrains Mono',monospace;--font:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;width:100vw;max-width:100%;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:99px}

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { from { opacity: .4; } to { opacity: 1; } }

/* APP */
.app{display:grid;grid-template-rows:var(--topbar) 1fr;height:100vh}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:9px;padding:0 14px;
  background:var(--bg2);border-bottom:1px solid var(--border);z-index:300;position:relative;
}
.logo{font-size:17px;font-weight:800;letter-spacing:-1px;color:var(--text);display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:background 0.3s;}
.ham{display:none;width:38px;height:38px;align-items:center;justify-content:center;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:18px;flex-shrink:0;transition:all .15s}
.ham:hover{color:var(--text);background:var(--bg4)}
.svc-pills{display:flex;gap:3px;flex-shrink:0}
.spill{
  display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);transition:all .15s;white-space:nowrap
}
.spill:hover{color:var(--text);background:var(--bg4)}
.spill .sdot{width:6px;height:6px;border-radius:50%}
.spill[data-s="coomer"] .sdot{background:var(--c)}
.spill[data-s="leak"]   .sdot{background:var(--l)}
.spill[data-s="both"]   .sdot{background:linear-gradient(135deg,var(--c),var(--l))}
.spill.on[data-s="coomer"]{background:var(--cg);border-color:var(--c);color:var(--c)}
.spill.on[data-s="leak"]  {background:var(--lg);border-color:var(--l);color:var(--l)}
.spill.on[data-s="both"]  {background:var(--cg);border-color:var(--accent);color:var(--accent)}
.search-w{flex:1;max-width:360px;position:relative}
.search-w input{
  width:100%;padding:8px 12px 8px 32px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s
}
.search-w input:focus{border-color:var(--accent)}
.search-w input::placeholder{color:var(--text3)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}
.tbr{display:flex;align-items:center;gap:6px;margin-left:auto}
.ibtn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0
}
.ibtn:hover{background:var(--bg4);color:var(--text)}
.ibtn.on{background:var(--accentg);border-color:var(--accent);color:var(--accent)}

/* BODY */
.body{display:grid;grid-template-columns:var(--sidebar) 1fr;overflow:hidden;height:100%}
.overlay{display:none;position:fixed;inset:0;top:var(--topbar);z-index:150;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);animation:fadeIn 0.2s ease;}
.overlay.on{display:block}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(0.16, 1, 0.3, 1);}
.sb-head{padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.sb-status{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sb-scroll{flex:1;overflow-y:auto;padding:8px}

.up-btn{cursor:pointer;margin-left:8px;font-size:10px;color:var(--text2);background:var(--bg4);padding:3px 6px;border-radius:4px;border:1px solid var(--border2);transition:all .15s;}
.up-btn:hover{color:var(--text);border-color:var(--text2);}

/* Creator card */
.cc{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative}
.cc:hover{background:var(--bg3)}
.cc.on{background:var(--bg4)}
.cc.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:0 3px 3px 0;background:var(--accent)}
.cav{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:var(--bg4);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text2)}
.cav img{width:100%;height:100%;object-fit:cover}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:10px;color:var(--text3);margin-top:3px}
.stag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase}
.stag.coomer{background:var(--cg);color:var(--c)}
.stag.leak{background:var(--lg);color:var(--l)}

/* CONTENT */
.content{display:flex;flex-direction:column;overflow:hidden}
.cscroll{flex:1;overflow-y:auto}

/* HOME TABS */
.htabs-bar{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;flex-shrink:0}
.htab{
  padding:14px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px
}
.htab:hover{color:var(--text2)}
.htab.on{color:var(--text);border-bottom-color:var(--accent)}
.htab-ct{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:var(--bg4);color:var(--text3)}
.htab.on .htab-ct{background:var(--accentg);color:var(--accent)}
.hsec{display:none;padding:14px}
.hsec.on{display:block; animation:fadeIn 0.3s ease;}

/* MEDIA GRID */
.mgrid{display:grid;gap:12px}
.mgrid.g2{grid-template-columns:repeat(2,1fr)}
.mgrid.g3{grid-template-columns:repeat(3,1fr)}
.mgrid.g4{grid-template-columns:repeat(4,1fr)}
.mgrid.g5{grid-template-columns:repeat(5,1fr)}

/* MEDIA CARD */
.mcard{border-radius:var(--rl);overflow:hidden;cursor:pointer;background:var(--bg3);position:relative;transition:transform .2s,box-shadow .2s;border:1px solid var(--border);opacity:0;animation:fadeUp 0.4s ease forwards;}
.mcard:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(0,0,0,0.5);border-color:var(--border2);z-index:2;}
.mthumb{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--bg4)}
.mthumb img,.mthumb video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.mcard:hover .mthumb img,.mcard:hover .mthumb video{transform:scale(1.06)}
.movlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 60%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.mcard:hover .movlay{opacity:1}
.movlay-c{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#fff}
.movlay-c img{width:20px;height:20px;border-radius:50%;object-fit:cover}
.vbadge{position:absolute;top:8px;right:8px;background:rgba(255,60,110,.9);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;backdrop-filter:blur(4px)}

/* LOAD MORE */
.lmore{display:flex;align-items:center;justify-content:center;padding:14px;margin:10px 0 30px;border-radius:12px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;gap:8px;width:100%}
.lmore:hover{background:var(--bg4);color:var(--text)}
.lmore:disabled{opacity:.4;cursor:default}

/* SKELETON */
.skel{border-radius:var(--rl);overflow:hidden;background:var(--bg3);border:1px solid var(--border)}
.skel-t{aspect-ratio:3/4;background:var(--bg4);animation:pulse 1.4s ease-in-out infinite alternate}

/* PROFILE */
.p-banner{width:100%;height:140px;background:var(--bg3);background-size:cover;background-position:center;position:relative}
.p-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg2) 100%)}
.p-hero{background:var(--bg2);padding:0 20px 20px;display:flex;align-items:flex-start;gap:16px;border-bottom:1px solid var(--border)}
.p-av{width:86px;height:86px;border-radius:16px;flex-shrink:0;background:var(--bg4);overflow:hidden;margin-top:-30px;position:relative;z-index:1;border:4px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--text2);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.p-av img{width:100%;height:100%;object-fit:cover}
.p-det{flex:1;min-width:0;padding-top:6px}
.p-name{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.p-stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.pst{font-size:12px;color:var(--text3)}
.pst strong{color:var(--text2);font-weight:700}
.p-acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* BUTTONS */
.btn-p{padding:8px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-block}
.btn-p:hover{opacity:.85}
.btn-g{padding:8px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-g:hover{background:var(--bg4);color:var(--text)}

/* TOOLBAR */
.tbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tbar-title{font-size:13px;color:var(--text2);font-weight:600;flex:1;min-width:60px}
.gtog{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:4px}
.gb{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;transition:all .15s}
.gb.on{background:var(--bg5);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.fsel{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;outline:none;cursor:pointer;transition:border-color .15s;}
.fsel:hover{border-color:var(--text3);}

/* SEARCH RESULTS */
.sres{padding:16px}
.sres-title{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.spc{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:all .2s;margin-bottom:8px;animation:fadeUp 0.3s ease forwards;}
.spc:hover{background:var(--bg4);transform:translateX(5px);border-color:var(--text3);}
.spc-av{width:48px;height:48px;border-radius:12px;object-fit:cover;background:var(--bg5);flex-shrink:0}
.spc-info{flex:1;min-width:0}
.spc-n{font-size:14px;font-weight:700}
.spc-s{font-size:12px;color:var(--text3);margin-top:3px}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center;animation:fadeIn 0.3s ease;}
.empty .big{font-size:40px;opacity:.2}
.empty p{font-size:13px;color:var(--text3);line-height:1.6}

/* SPINNER */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:pulse .7s linear infinite}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:1000;background:rgba(5,5,10,.97);display:none;flex-direction:column;animation:fadeIn 0.2s ease;}
.lb.on{display:flex}
.lb-top{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.lb-ci{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.lb-cav{width:34px;height:34px;border-radius:8px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.lb-cn{font-size:14px;font-weight:700}
.lb-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.lb-acts{display:flex;gap:8px}
.lb-close{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .15s}
.lb-close:hover{background:var(--bg4);color:var(--accent);}

.lb-body{flex:1;display:flex;overflow:hidden}
.lb-media{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#000;overflow:hidden}
.lb-media img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;animation:fadeIn 0.3s ease;}
.lb-media video{max-width:100%;max-height:100%;outline:none;animation:fadeIn 0.3s ease;}

.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:12px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;backdrop-filter:blur(10px);transition:all .2s;z-index:5}
.lb-nav:hover{background:rgba(255,255,255,.25);transform:translateY(-50%) scale(1.1);}
.lb-nav:disabled{opacity:0;pointer-events:none}
.lb-nav.p{left:16px}
.lb-nav.n{right:16px}

.lb-reels{position:absolute;right:16px;bottom:75px;display:flex;flex-direction:column;gap:10px;z-index:5}
.lb-rb{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(10px);transition:all .2s}
.lb-rb:hover{background:rgba(255,255,255,.25);transform:scale(1.1);}
.lb-rb:disabled{opacity:.25;pointer-events:none}

.lb-stats{position:absolute;bottom:0;left:0;right:0;padding:32px 16px 14px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);display:flex;align-items:center;gap:12px;pointer-events:none}
.lb-stat{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);font-family:var(--mono);display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:6px;backdrop-filter:blur(4px);}

.lb-panel{width:300px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lbp-head{padding:16px;border-bottom:1px solid var(--border)}
.lbp-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.4;}
.lbp-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.lbp-body{flex:1;overflow-y:auto;padding:14px}
.lbp-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.sug-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sug-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--bg4)}
.sug-item:hover,.sug-item.on{border-color:var(--accent);transform:scale(1.05);}
.sug-item img,.sug-item video{width:100%;height:100%;object-fit:cover}

/* VIDEO CONTROLS */
.vcw{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.vcw video{max-width:100%;max-height:100%;object-fit:contain}
.vcc{position:absolute;bottom:0;left:0;right:0;padding:30px 16px 14px;background:linear-gradient(transparent,rgba(0,0,0,.95))}
.vbar{height:5px;border-radius:3px;background:rgba(255,255,255,.2);cursor:pointer;margin-bottom:12px;position:relative;transition:height 0.15s;}
.vbar:hover{height:7px;}
.vfill{height:100%;border-radius:3px;background:var(--accent);width:0%;transition:width .1s linear}
.vtmb{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 0 0 2px var(--accent);pointer-events:none}
.vcr{display:flex;align-items:center;gap:12px}
.vb{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;backdrop-filter:blur(4px);}
.vb:hover{background:rgba(255,255,255,.25)}
.vt{font-family:var(--mono);font-size:12px;font-weight:500;color:rgba(255,255,255,.85)}
.vvol{width:70px;accent-color:var(--accent)}

/* ── MODAL UI ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
  display: none; align-items: center; justify-content: center; padding: 16px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px;
  width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6); overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 16px; font-weight: 800; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }
.modal-section-label {
  font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px;
}
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
.modal-desc code { color: var(--text); background: var(--bg4); padding: 2px 6px; border-radius: 5px; font-family: var(--mono); font-size: 12px; }
.server-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.server-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 10px; background: var(--bg3); border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.server-row.active-server { border-color: var(--accent); background: var(--accentg); }
.server-row-url { font-size: 13px; font-family: var(--mono); color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.server-row-status { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
.server-row-status.ok { background: rgba(0,212,255,0.15); color: var(--l); }
.server-row-status.err { background: rgba(255,60,110,0.15); color: var(--accent); }
.server-row-status.checking { color: var(--text3); }
.server-use-btn {
  font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
  background: var(--bg4); color: var(--text3); border: 1px solid var(--border2);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.server-use-btn:hover { color: var(--text); border-color: var(--text2); }

.server-del-btn {
  width: 28px; height: 28px; border-radius: 6px; background: none; border: none;
  color: var(--text3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;

}
.server-del-btn:hover { color: var(--accent); background: var(--bg4); }
.server-add-row { display: flex; gap: 10px; align-items: center; }
.server-input {

        <span>Use CORS proxy as fallback</span>

<script>
'use strict';
// ── CONFIG & SERVER SETTINGS ─────────────────────────────
const BUILTIN_SERVERS = ['https://coomer.st','https://kemono.su'];
const PROXY = 'https://corsproxy.io/?url=';
const CDN   = 'https://cdn.leakgallery.com/';
const LGAPI = 'https://api.leakgallery.com';

function loadServerConfig() {
  try { const saved = localStorage.getItem('vault_server_cfg'); if (saved) return JSON.parse(saved); } catch(e) {}
  return { active: BUILTIN_SERVERS[0], custom: [], useProxy: true };
}
function saveServerConfig() { try { localStorage.setItem('vault_server_cfg', JSON.stringify(serverCfg)); } catch(e) {} }

let serverCfg = loadServerConfig();
if (!serverCfg.active) serverCfg.active = BUILTIN_SERVERS[0];
let activeCServer = serverCfg.active;
function allServers() { return [...BUILTIN_SERVERS, ...serverCfg.custom]; }

// ── STATE ────────────────────────────────────────────────
let S = {
  svc:'coomer', gs:4, view:'home',
  profile:null, pMedias:[], pPage:1, pLoad:false, pDone:false,
  htabs:{
    cp:{posts:[],off:0,load:false,done:false},
    cl:{posts:[],off:0,load:false,done:false},
    ld:{items:[],page:1,load:false,done:false}
  },
  activeTab:'cp',
  lb:{open:false,items:[],idx:0,svc:'coomer',creator:null,media:[],midx:0},
  allCreators: [], 
  creatorsOffset: 0,
  query: ''
};

// ── UTILS ────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n);
function fmtT(s){const m=Math.floor(s/60);return`${m}:${String(Math.floor(s%60)).padStart(2,'0')}`}
function isVid(p){return/\.(mp4|webm|mov|mkv|m4v|ogv)(\?.*)?$/i.test(p||'')}
function cMediaUrl(p){if(!p)return'';if(p.startsWith('http'))return p;return activeCServer+p}
function lUrl(p){if(!p)return'';if(p.startsWith('http'))return p;return CDN+p}
function cIcon(svc,id){return`https://img.coomer.st/icons/${svc}/${id}`}
function cBanner(svc,id){return`https://img.coomer.st/banners/${svc}/${id}`}
function gcls(){return'mgrid g'+S.gs}
function skel(n){return`<div class="${gcls()}">${Array.from({length:n},()=>'<div class="skel"><div class="skel-t"></div></div>').join('')}</div>`}

function getCoomerMedia(post){
  const a=[];
  if(post.file&&post.file.path)a.push(post.file);
  if(post.attachments)a.push(...post.attachments.filter(x=>x&&x.path));
  return a;
}

// ── URL ROUTING ──────────────────────────────────────────
function updateURL(svc, creator, post) {
  const url = new URL(window.location);
  if (svc && creator) {
    url.searchParams.set('service', svc);
    url.searchParams.set('creator', creator);
  } else {
    url.searchParams.delete('service');
    url.searchParams.delete('creator');
  }
  if (post) url.searchParams.set('post', post);
  else url.searchParams.delete('post');
  window.history.pushState({}, '', url);
}

window.addEventListener('popstate', async () => {
  const p = new URLSearchParams(window.location.search);
  const svc = p.get('service'), cid = p.get('creator'), pid = p.get('post');
  
  if (!svc || !cid) {
    closeLB(true);
    showHome(true);
    return;
  }

  let cObj = S.allCreators.find(c => c.id === cid && (svc === 'leak' ? c.svc === 'leak' : c.coomerSvc === svc));
  if (!cObj) cObj = { id: cid, name: cid, svc: svc === 'leak' ? 'leak' : 'coomer', coomerSvc: svc };

  if (!S.profile || S.profile.id !== cid) {
    await loadProfile(cObj, true);
  }

  if (pid) {
    const idx = S.pMedias.findIndex(m => m.id === pid || m.file_path?.includes(pid));
    if (idx >= 0) {
      if (cObj.svc === 'leak') openLBLeak(S.pMedias, idx, cObj, true);
      else openLBCoomer(S.pMedias, idx, cObj, true);
    }
  } else {
    closeLB(true);
  }
});

// ── FETCH ────────────────────────────────────────────────
async function fetchJ(url, opts = {}){
  try{const r=await fetch(url, opts);if(r.ok)return r.json()}catch(e){}
  try{const r=await fetch(PROXY+encodeURIComponent(url), opts);if(r.ok)return r.json()}catch(e){}
  throw new Error('Failed: '+url);
}

async function cFetch(path){
  const servers = allServers();
  const ordered = [serverCfg.active, ...servers.filter(s => s !== serverCfg.active)];

  for(const b of ordered){
    try{const r=await fetch(b+path,{headers:{Accept:'text/css'}});if(r.ok){serverCfg.active=b; activeCServer=b; saveServerConfig(); return r.json()}}catch(e){}
  }
  if (serverCfg.useProxy) {
    for(const b of ordered){
      try{const r=await fetch(PROXY+encodeURIComponent(b+path),{headers:{Accept:'text/css'}});if(r.ok){serverCfg.active=b; activeCServer=b; saveServerConfig(); return r.json()}}catch(e){}
    }
  }
  throw new Error('Coomer fetch failed: '+path);
}

async function lFetch(path, opts = {}){return fetchJ(LGAPI+path, opts)}

// ── MODAL SERVER LOGIC ──────────────────────────────────
function openServerModal() { renderServerModal(); $('serverModal').classList.add('open'); }
function closeServerModal() { $('serverModal').classList.remove('open'); }

function renderServerModal() {
  const builtinEl = $('builtinServerList');
  builtinEl.innerHTML = BUILTIN_SERVERS.map(url => {
    const isActive = serverCfg.active === url;
    return `<div class="server-row ${isActive ? 'active-server' : ''}">
      <span class="server-row-url">${url}</span>
      <span class="server-row-status checking" data-ping="${url}">…</span>
      <button class="server-use-btn ${isActive ? 'active-btn' : ''}" data-use="${url}">${isActive ? '✓ Active' : 'Use'}</button>
    </div>`;
  }).join('');

  renderCustomServerList();
  const toggle = $('useProxyToggle'); if (toggle) toggle.checked = serverCfg.useProxy;
  pingServers();

  builtinEl.querySelectorAll('[data-use]').forEach(btn => {
    btn.addEventListener('click', () => {
      serverCfg.active = btn.dataset.use;
      activeCServer = serverCfg.active;
      saveServerConfig(); renderServerModal();
    });
  });
}

function renderCustomServerList() {
  const el = $('customServerList');
  if (!serverCfg.custom.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:6px 0;">No custom servers added.</div>'; return; }
  
  el.innerHTML = serverCfg.custom.map((url, i) => {
    const isActive = serverCfg.active === url;
    return `<div class="server-row ${isActive ? 'active-server' : ''}">
      <span class="server-row-url">${url}</span>
      <span class="server-row-status checking" data-ping="${url}">…</span>
      <button class="server-use-btn ${isActive ? 'active-btn' : ''}" data-use="${url}">${isActive ? '✓ Active' : 'Use'}</button>
      <button class="server-del-btn" data-del="${i}" title="Remove">✕</button>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-use]').forEach(btn => {
    btn.addEventListener('click', () => { serverCfg.active = btn.dataset.use; activeCServer = serverCfg.active; saveServerConfig(); renderServerModal(); });
  });
  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.del); serverCfg.custom.splice(i, 1);
      if (!allServers().includes(serverCfg.active)) serverCfg.active = BUILTIN_SERVERS[0];
      saveServerConfig(); renderServerModal();
    });
  });
}

async function pingServers() {
  const badges = document.querySelectorAll('[data-ping]');
  for (const badge of badges) {
    const url = badge.dataset.ping;
    try {
      const t = Date.now(); const res = await fetch(url + '/api/v1/posts?o=0', { method: 'HEAD', cache: 'no-store' });
      const ms = Date.now() - t;
      if (res.ok || res.status === 405) { badge.textContent = ms + 'ms'; badge.className = 'server-row-status ok'; } 
      else { badge.textContent = res.status; badge.className = 'server-row-status err'; }
    } catch(e) { badge.textContent = 'offline'; badge.className = 'server-row-status err'; }
  }
}

function bindServerModal() {
  $('serverBtn').addEventListener('click', openServerModal);
  $('serverModalClose').addEventListener('click', closeServerModal);
  $('serverModal').addEventListener('click', e => { if (e.target === $('serverModal')) closeServerModal(); });

  $('addServerBtn').addEventListener('click', () => {
    let url = $('customServerInput').value.trim();
    if (!url) return;
    if (!url.startsWith('http')) url = 'https://' + url;
    url = url.replace(/\/$/, '');
    if (!serverCfg.custom.includes(url) && !BUILTIN_SERVERS.includes(url)) { serverCfg.custom.push(url); saveServerConfig(); }
    $('customServerInput').value = ''; renderServerModal();
  });
  $('customServerInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('addServerBtn').click(); });
  $('useProxyToggle').addEventListener('change', e => { serverCfg.useProxy = e.target.checked; saveServerConfig(); });

  const handleCreatorsFile = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const raw = JSON.parse(e.target.result);
        const list = Array.isArray(raw) ? raw : (raw?.creators || []);
        if(!list.length) return alert('No creators found in file. Ensure it is a valid creators.json/txt array.');
        
        S.allCreators = list.map(c => ({
          id: c.id, name: c.name || c.id, svc: 'coomer', 
          coomerSvc: c.service || 'onlyfans', avatar: cIcon(c.service || '', c.id)
        }));
        
        renderSidebar();
        $('uploadedFileName').textContent = '✓ ' + file.name;
        if($('serverModal').classList.contains('open')) closeServerModal();
      } catch(err) { alert('Error parsing JSON file: ' + err.message); }
    };
    reader.readAsText(file);
  };

  $('modalCreatorsFile').addEventListener('change', e => { if(e.target.files[0]) handleCreatorsFile(e.target.files[0]); });
  $('sbCreatorsFile').addEventListener('change', e => { if(e.target.files[0]) handleCreatorsFile(e.target.files[0]); });
}

// ── SIDEBAR CREATORS INITIALIZATION ──────────────────────
async function loadCreators() {
  $('sbStatus').textContent = 'Loading...';
  let list = [];
  try {
    const res = await fetch('./creators.json');
    if (res.ok) {
      const raw = await res.json();
      list = Array.isArray(raw) ? raw : (raw?.creators || []);
    }
  } catch(e) {}

  if (!list.length) {
    try {
      const raw = await cFetch('/api/v1/creators.txt');
      list = Array.isArray(raw) ? raw : (raw?.creators || []);
    } catch(e) {}
  }

  S.allCreators = list.map(c => ({
    id: c.id,
    name: c.name || c.id,
    svc: 'coomer', 
    coomerSvc: c.service || 'onlyfans',
    avatar: cIcon(c.service || '', c.id)
  }));
  
  renderSidebar();
}

function renderSidebar(append = false) {
  const el = $('creatorList');
  if (!append) { S.creatorsOffset = 0; el.innerHTML = ''; }
  
  let filtered = S.allCreators;
  if (S.svc === 'coomer') filtered = filtered.filter(c => c.svc === 'coomer');
  if (S.svc === 'leak') filtered = filtered.filter(c => c.svc === 'leak');
  
  if (S.query) {
    const ql = S.query.toLowerCase();
    filtered = filtered.filter(c => c.name.toLowerCase().includes(ql) || c.id.toLowerCase().includes(ql));
  }
  
  $('sbStatus').textContent = filtered.length + ' loaded';
  const page = filtered.slice(S.creatorsOffset, S.creatorsOffset + 50);
  
  if (!page.length && !append) {
    el.innerHTML = '<div class="empty"><div class="big">◈</div><p>No creators found</p></div>';
    return;
  }

  const html = page.map((r, i) => {
    const idx = S.creatorsOffset + i;
    const isOn = S.profile?.id === r.id && S.profile?.svc === r.svc;
    return `<div class="cc${isOn ? ' on' : ''}" data-idx="${idx}">
      <div class="cav"><img src="${esc(r.avatar)}" onerror="this.style.opacity='.2'" loading="lazy"></div>
      <div class="ci">
        <div class="cn">@${esc(r.name)}</div>
        <div class="cm"><span class="stag ${r.svc}">${r.svc==='coomer'?(r.coomerSvc||'OF'):'LeakGallery'}</span></div>
      </div>
    </div>`;
  }).join('');
  
  if (append) el.insertAdjacentHTML('beforeend', html);
  else el.innerHTML = html;
  
  el.querySelectorAll('.cc:not(.bound)').forEach(c => {
    c.classList.add('bound');
    c.addEventListener('click', () => {
      closeSidebar();
      loadProfile(filtered[+c.dataset.idx]);
      el.querySelectorAll('.cc').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
    });
  });
}

$('creatorList').addEventListener('scroll', () => {
  const el = $('creatorList');
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 50) {
     let filtered = S.allCreators;
     if (S.svc === 'coomer') filtered = filtered.filter(c => c.svc === 'coomer');
     if (S.svc === 'leak') filtered = filtered.filter(c => c.svc === 'leak');
     if (S.query) {
       const ql = S.query.toLowerCase();
       filtered = filtered.filter(c => c.name.toLowerCase().includes(ql) || c.id.toLowerCase().includes(ql));
     }
     
     if (S.creatorsOffset + 50 < filtered.length) {
        S.creatorsOffset += 50;
        renderSidebar(true);
     }
  }
});


// ── HOME ─────────────────────────────────────────────────
function getTabDefs(){
  const tabs=[];
  if(S.svc==='coomer'||S.svc==='both'){
    tabs.push({key:'cp',icon:'⭐',label:'Popular'});
    tabs.push({key:'cl',icon:'🕒',label:'Latest'});
  }
  if(S.svc==='leak'||S.svc==='both'){
    tabs.push({key:'ld',icon:'🔥',label:'Trending'});
  }
  return tabs;
}

function showHome(skipUrl = false){
  S.view='home';$('homeBtn').classList.add('on');closeLB(true);
  
  if (!skipUrl) updateURL(null, null);

  const tabs=getTabDefs();
  $('cscroll').innerHTML=`
    <div>
      <div class="htabs-bar" id="htbar">
        ${tabs.map((t,i)=>`<div class="htab${i===0?' on':''}" data-k="${t.key}">${t.icon} ${t.label}<span class="htab-ct" id="hct-${t.key}">—</span></div>`).join('')}
      </div>
      ${tabs.map((t,i)=>`<div class="hsec${i===0?' on':''}" id="hs-${t.key}">${skel(8)}<button class="lmore" id="lm-${t.key}" disabled>Loading…</button></div>`).join('')}
    </div>`;

  $('htbar').addEventListener('click',e=>{
    const t=e.target.closest('.htab');if(!t)return;
    const k=t.dataset.k;S.activeTab=k;
    document.querySelectorAll('.htab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    document.querySelectorAll('.hsec').forEach(x=>x.classList.remove('on'));
    $(`hs-${k}`).classList.add('on');
    const f=S.htabs[k];
    if(!(f.posts||f.items||[]).length&&!f.load)loadTab(k);
  });
  tabs.forEach(t=>{const b=$(`lm-${t.key}`);if(b)b.addEventListener('click',()=>loadTab(t.key));});
  S.activeTab=tabs[0].key;
  loadTab(tabs[0].key);
}

async function loadTab(key){
  const f=S.htabs[key];if(f.load||f.done)return;
  f.load=true;
  const btn=$(`lm-${key}`);
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Loading…'}

  try{
    let items=[],done=false;
    if(key==='cp'){
      const raw=await cFetch('/api/v1/posts/popular?period=recent');
      items=raw?.posts||(Array.isArray(raw)?raw:[]);done=true;
      const b=$(`hct-${key}`);if(b)b.textContent=raw?.props?.count??items.length;
    }else if(key==='cl'){
      const raw=await cFetch(`/api/v1/posts?o=${f.off}`);
      items=raw?.posts||(Array.isArray(raw)?raw:[]);done=items.length<50;
      const b=$(`hct-${key}`);if(b&&raw?.count)b.textContent=fmt(raw.count);
    }else if(key==='ld'){
      const raw=await lFetch(`/popular/media/Day/${f.page}?fake=true`);
      items=Array.isArray(raw)?raw:[];done=items.length===0;
    }

    const sec=$(`hs-${key}`);
    sec.querySelectorAll('.skel').forEach(s=>s.remove());
    let g=sec.querySelector('.mgrid');
    if(!g){g=document.createElement('div');g.className=gcls();sec.insertBefore(g,sec.querySelector('.lmore'))}

    const start=g.children.length;
    if(key.startsWith('c')){f.posts=(f.posts||[]).concat(items);f.off+=items.length;}
    else{f.items=(f.items||[]).concat(items);f.page++;}
    f.done=done;

    items.forEach((item,i)=>{
       const card = buildCard(item,key,start+i);
       card.style.animationDelay = `${i * 0.03}s`;
       g.appendChild(card);
    });

    const total=(f.posts||f.items||[]).length;
    const b=$(`hct-${key}`);
    if(b&&key!=='cp')b.textContent=total+(done?'':'+');
    if(btn){
      if(done){btn.textContent=`All ${total} loaded`;btn.disabled=true;}
      else{btn.textContent=`Load more (${total} loaded)`;btn.disabled=false;}
    }
  }catch(e){
    const sec=$(`hs-${key}`);
    if(sec&&!(S.htabs[key].posts||S.htabs[key].items||[]).length){
      sec.querySelectorAll('.mgrid,.skel').forEach(x=>x.remove());
      const d=document.createElement('div');d.className='empty';
      d.innerHTML=`<div class="big">⚠</div><p>Failed to load</p>`;
      sec.insertBefore(d,sec.querySelector('.lmore'));
    }
    if(btn){btn.textContent='Retry';btn.disabled=false;}
  }
  f.load=false;
}

function buildCard(item,tabKey,idx){
  const div=document.createElement('div');div.className='mcard';
  const isLeak=tabKey==='ld';
  let thumb,vid,cname,cav;
  if(isLeak){
    thumb=lUrl(item.thumbnail_path);vid=item.is_video;
    cname=item.profile?.username||'';cav=item.profile?.profile_pic||'';
  }else{
    const m=getCoomerMedia(item);const first=m[0];
    thumb=first?cMediaUrl(first.path):'';vid=first?isVid(first.path):false;
    cname=item.user||'';cav=cIcon(item.service||'',item.user||'');
  }
  div.innerHTML=`<div class="mthumb">
    ${thumb?(vid?`<video src="${esc(thumb)}" muted preload="metadata" style="pointer-events:none"></video>`:`<img src="${esc(thumb)}" loading="lazy" onerror="this.style.opacity='.12'">`):'<div style="height:100%;background:var(--bg5)"></div>'}
    ${vid?'<div class="vbadge">▶ VIDEO</div>':''}
    <div class="movlay"><div class="movlay-c">
      ${cav?`<img src="${esc(cav)}" onerror="this.style.display='none'" loading="lazy">`:''}
      ${cname?`@${esc(cname)}`:''}
    </div></div>
  </div>`;
  div.addEventListener('click',()=>{
    if(isLeak){
      openLBLeak(S.htabs.ld.items,idx,null);
    }else{
      const arr=tabKey==='cp'?S.htabs.cp.posts:S.htabs.cl.posts;
      openLBCoomer(arr,idx,null);
    }
  });
  return div;
}

let searchTimer;
async function doSearch(q){
  S.query = q;
  renderSidebar();

  if(!q.trim())return;
  S.view='search';$('homeBtn').classList.remove('on');closeLB(true);
  $('cscroll').innerHTML=`<div class="sres"><div class="sres-title">Searching "${esc(q)}"…</div><div id="srBody"><span class="spin"></span></div></div>`;
  
  const results=[];const svc=S.svc;
  
  if(svc==='coomer'||svc==='both'){
    const ql = q.toLowerCase();
    S.allCreators.filter(c => c.name.toLowerCase().includes(ql) || c.id.toLowerCase().includes(ql)).slice(0, 25).forEach(c => {
      results.push(c);
    });
  }

  try{
    if(svc==='leak'||svc==='both'){
      // USE POST REQUEST FOR LEAKGALLERY SEARCH
      const raw=await lFetch(`/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ search: q })
      });
      (Array.isArray(raw)?raw:[]).forEach(c=>{
        results.push({svc:'leak',id:c.username,name:c.username,avatar:c.profile_pic,views:c.all_time_views,banner:c.banner_pic});
      });
    }
  }catch(e){}

  const body=$('srBody');if(!body)return;
  if(!results.length){body.innerHTML='<div class="empty"><div class="big">◻</div><p>No creators found</p></div>';return;}
  body.innerHTML=results.map((r,i)=>{
    const tag=r.svc==='coomer'?`<span class="stag coomer">${r.coomerSvc||'OF'}</span>`:'<span class="stag leak">LeakGallery</span>';
    return`<div class="spc" data-i="${i}" style="animation-delay:${i * 0.02}s">
      <img class="spc-av" src="${esc(r.avatar||'')}" onerror="this.style.opacity='.2'" loading="lazy">
      <div class="spc-info">
        <div class="spc-n">@${esc(r.name)} ${tag}</div>
        <div class="spc-s">${r.views?'👁 '+fmt(r.views)+' views':''}</div>
      </div>
      <span style="color:var(--text3); font-size: 18px;">›</span>
    </div>`;
  }).join('');
  
  body.querySelectorAll('.spc').forEach(c=>c.addEventListener('click',()=>{
    const r=results[+c.dataset.i];
    loadProfile(r);
  }));
}

function reloadProfile(){
  S.pMedias=[];S.pPage=1;S.pDone=false;
  $('pgrid').innerHTML=skel(12);fetchPPage();
}
function reRenderPGrid(){
  const pg=$('pgrid');if(!pg)return;
  pg.innerHTML='';
  const g=document.createElement('div');g.className=gcls();
  S.pMedias.forEach((m,i)=>g.appendChild(buildPCard(m,i)));
  pg.appendChild(g);
}

async function fetchPPage(){
  if(S.pLoad||S.pDone)return;S.pLoad=true;
  const c=S.profile;
  const btn=$('plmore');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>'}
  try{
    let items=[],done=false;
    if(c.svc==='coomer'){
      const raw=await cFetch(`/api/v1/${c.coomerSvc}/user/${c.id}/posts?o=${S.pMedias.length}`);
      items=Array.isArray(raw)?raw:(raw?.posts||[]);done=items.length<50;
    }else{
      const sort=$('psort')?.value||'MostRecent';
      const type=$('ptype')?.value||'All';
      const raw=await lFetch(`/profile/${c.id}/${S.pPage}?type=${type}&sort=${sort}&fake=true`);
      items=raw?.medias||[];done=items.length===0;S.pPage++;
    }
    const start=S.pMedias.length;S.pMedias.push(...items);S.pDone=done;
    const t=$('ptitle');if(t)t.textContent=S.pMedias.length+(done?'':'+')+ ' posts';
    const pp=$('ppc');if(pp)pp.innerHTML=`<strong>${S.pMedias.length}${done?'':'+'}</strong> posts`;
    const pg=$('pgrid');
    pg.querySelectorAll('.skel').forEach(s=>s.remove());
    let g=pg.querySelector('.mgrid');
    if(!g){g=document.createElement('div');g.className=gcls();pg.appendChild(g);}
    
    items.forEach((m,i)=>{
       const card = buildPCard(m,start+i);
       card.style.animationDelay = `${i * 0.03}s`;
       g.appendChild(card);
    });

    if(btn){
      if(done){btn.textContent=`All ${S.pMedias.length} loaded`;btn.disabled=true;}
      else{btn.textContent=`Load more (${S.pMedias.length} loaded)`;btn.disabled=false;}
    }
  }catch(e){if(btn){btn.textContent='Retry';btn.disabled=false;}}
  S.pLoad=false;
}

function buildPCard(item,idx){
  const div=document.createElement('div');div.className='mcard';
  const c=S.profile;
  let thumb,vid;
  if(c.svc==='coomer'){
    const m=getCoomerMedia(item);const f=m[0];
    thumb=f?cMediaUrl(f.path):'';vid=f?isVid(f.path):false;
  }else{thumb=lUrl(item.thumbnail_path);vid=item.is_video;}
  div.innerHTML=`<div class="mthumb">
    ${thumb?(vid?`<video src="${esc(thumb)}" muted preload="metadata" style="pointer-events:none"></video>`:`<img src="${esc(thumb)}" loading="lazy" onerror="this.style.opacity='.12'">`):'<div style="height:100%;background:var(--bg5)"></div>'}
    ${vid?'<div class="vbadge">▶</div>':''}
  </div>`;
  div.addEventListener('click',()=>{
    if(c.svc==='leak')openLBLeak(S.pMedias,idx,c);
    else openLBCoomer(S.pMedias,idx,c);
  });
  return div;
}

function clearLBMedia(){

function setLBLoad(){clearLBMedia();const s=document.createElement('span');s.className='spin';$('lbMedia').appendChild(s);}

async function openLBLeak(items,idx,creator,skipUrl=false){
  S.lb={open:true,items,idx,svc:'leak',creator,media:[],midx:0};
  $('lb').classList.add('on');document.body.style.overflow='hidden';
  const item=items[idx];

     updateURL('leak', creator.id, item.id);

  $('lbUp').disabled=idx===0;$('lbDn').disabled=idx===items.length-1;
  $('lbP').style.display='none';$('lbN').style.display='none';
  setLBLoad();
  try{
    const d=await lFetch(`/media/${item.id}`);
    renderLBLeakDetail(d,creator||{svc:'leak',name:d.profile?.username||'',avatar:d.profile?.profile_pic||''});
  }catch(e){renderLBLeakBasic(item);}
}

function renderLBLeakDetail(d,creator){
  if(!S.lb.open)return;
  clearLBMedia();
  const url=lUrl(d.file_path);const vid=d.is_video;
  if(vid){
    const w=buildVidWrap(url);$('lbMedia').appendChild(w);

  $('lbDl').href=url;

  ].join('');
  $('lbPT').textContent='@'+(d.profile?.username||'—');
  $('lbPD').textContent=d.added||'';
  const sg=$('lbSug');sg.innerHTML='';

  });
}

function renderLBLeakBasic(item){
  clearLBMedia();
  const url=lUrl(item.file_path||item.thumbnail_path);
  const el=item.is_video?document.createElement('video'):document.createElement('img');
  el.src=url;
  if(item.is_video){el.autoplay=true;el.loop=true;el.style.cssText='max-width:100%;max-height:100%;';}

function openLBCoomer(items,idx,creator,skipUrl=false){
  const item=items[idx];
  const media=getCoomerMedia(item);
  S.lb={open:true,items,idx,svc:'coomer',creator,media,midx:0};
  $('lb').classList.add('on');document.body.style.overflow='hidden';
  
  const prof=creator||{svc:'coomer',coomerSvc:item.service||'',id:item.user||'',name:item.user||''};

function renderCMedia(media,midx){
  if(!S.lb.open)return;
  S.lb.media=media;S.lb.midx=midx;
  clearLBMedia();
  $('lbP').style.display=media.length>1?'':'none';
  $('lbN').style.display=media.length>1?'':'none';
  $('lbP').disabled=midx===0;$('lbN').disabled=midx===media.length-1;
  const it=media[midx];if(!it)return;
  const url=cMediaUrl(it.path);const vid=isVid(it.path);
  if(vid){$('lbMedia').appendChild(buildVidWrap(url));}
  else{
    const img=document.createElement('img');img.src=url;
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;';
    $('lbMedia').appendChild(img);
  }
  $('lbDl').href=url;
  $('lbStats').innerHTML=media.length>1?`<span class="lb-stat">${midx+1} / ${media.length}</span>`:'';
  const post=S.lb.items[S.lb.idx];
  $('lbPT').textContent=post.title||'Untitled';
  $('lbPD').textContent=post.published?new Date(post.published).toLocaleDateString():'';
  const sg=$('lbSug');sg.innerHTML='';
  media.forEach((m,i)=>{
    const el=document.createElement('div');el.className='sug-item'+(i===midx?' on':'');
    if(i===midx)el.style.borderColor='var(--accent)';
    const u2=cMediaUrl(m.path);
    el.innerHTML=isVid(m.path)?`<video src="${esc(u2)}" muted preload="metadata"></video>`:`<img src="${esc(u2)}" loading="lazy">`;
    el.addEventListener('click',()=>renderCMedia(media,i));
    sg.appendChild(el);
  });
}

// ── VIDEO PLAYER ─────────────────────────────────────────
function buildVidWrap(url){
  const w=document.createElement('div');w.className='vcw';
  const v=document.createElement('video');
  v.src=url;v.loop=true;v.preload='auto';v.id='lbVid';
  const cc=document.createElement('div');cc.className='vcc';
  cc.innerHTML=`<div class="vbar" id="vbar"><div class="vfill" id="vfill"></div><div class="vtmb" id="vtmb"></div></div>
    <div class="vcr">
      <button class="vb" id="vplay">⏸</button>
      <span class="vt" id="vt">0:00 / 0:00</span>
      <div style="flex:1"></div>
      <button class="vb" id="vmute">🔊</button>
      <input class="vvol" type="range" id="vvol" min="0" max="1" step="0.05" value="1">
    </div>`;
  w.appendChild(v);w.appendChild(cc);
  setTimeout(()=>initVid(v),0);
  v.play().catch(()=>{});
  return w;
}
function initVid(v){
  const play=$('vplay'),fill=$('vfill'),tmb=$('vtmb'),bar=$('vbar'),t=$('vt'),mute=$('vmute'),vol=$('vvol');
  if(!play)return;
  v.addEventListener('timeupdate',()=>{
    if(!v.duration)return;
    const p=(v.currentTime/v.duration*100).toFixed(2);
    fill.style.width=p+'%';tmb.style.left=p+'%';
    t.textContent=`${fmtT(v.currentTime)} / ${fmtT(v.duration)}`;
  });
  v.addEventListener('play',()=>play.textContent='⏸');
  v.addEventListener('pause',()=>play.textContent='▶');
  play.addEventListener('click',()=>v.paused?v.play():v.pause());
  bar.addEventListener('click',e=>{const r=bar.getBoundingClientRect();v.currentTime=((e.clientX-r.left)/r.width)*v.duration;});
  mute.addEventListener('click',()=>{v.muted=!v.muted;mute.textContent=v.muted?'🔇':'🔊';});
  vol.addEventListener('input',()=>{v.volume=vol.value;});
}

  $('lb').classList.remove('on');
  if(!skipUrl) document.body.style.overflow='';

      updateURL(S.profile.svc === 'leak' ? 'leak' : S.profile.coomerSvc, S.profile.id);
    } else if (S.view === 'home') {
      updateURL(null, null);
    }
  }
}

function lbNav(dir){
  if(dir==='mp'||dir==='mn'){
    const ni=S.lb.midx+(dir==='mn'?1:-1);
    if(ni>=0&&ni<S.lb.media.length)renderCMedia(S.lb.media,ni);
    return;
  }
  const ni=S.lb.idx+(dir==='n'?1:-1);
  if(ni<0||ni>=S.lb.items.length)return;
  if(S.lb.svc==='leak')openLBLeak(S.lb.items,ni,S.lb.creator);
  else openLBCoomer(S.lb.items,ni,S.lb.creator);
}

// Mobile search toggle
if(window.innerWidth <= 600) {
  $('mobileSearchBtn').style.display = 'flex';
  $('mobileSearchBtn').addEventListener('click', () => {
    $('searchWrap').classList.toggle('mobile-open');
    if($('searchWrap').classList.contains('mobile-open')) $('searchInput').focus();
  });
}

$('homeBtn').addEventListener('click',()=>{
  if(S.view!=='home'){
    S.htabs={cp:{posts:[],off:0,load:false,done:false},cl:{posts:[],off:0,load:false,done:false},ld:{items:[],page:1,load:false,done:false}};
    showHome();
  }
});

$('gridBtn').addEventListener('click',()=>{
  S.gs=S.gs>=5?2:S.gs+1;
  document.querySelectorAll('.mgrid').forEach(g=>g.className='mgrid g'+S.gs);
});

document.querySelectorAll('.spill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.spill').forEach(x=>x.classList.remove('on'));
  p.classList.add('on');S.svc=p.dataset.s;
  const isL=S.svc==='leak';
  document.documentElement.style.setProperty('--accent',isL?'var(--l)':'var(--c)');
  document.documentElement.style.setProperty('--accentg',isL?'var(--lg)':'var(--cg)');
  
  renderSidebar();
  
  if(S.view==='home'){
    S.htabs={cp:{posts:[],off:0,load:false,done:false},cl:{posts:[],off:0,load:false,done:false},ld:{items:[],page:1,load:false,done:false}};
    showHome();
  }
}));

$('searchInput').addEventListener('input',e=>{
  clearTimeout(searchTimer);const q=e.target.value.trim();
  S.query=q;
  if(!q) { renderSidebar(); return; } 
  
  if(window.innerWidth<=900)openSidebar();
  searchTimer=setTimeout(()=>doSearch(q),380);
});
$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(searchTimer);doSearch(S.query);}});

$('lbClose').addEventListener('click',()=>closeLB());
$('lbP').addEventListener('click',()=>lbNav(S.lb.svc==='coomer'?'mp':'p'));
$('lbN').addEventListener('click',()=>lbNav(S.lb.svc==='coomer'?'mn':'n'));
$('lbUp').addEventListener('click',()=>lbNav('p'));
$('lbDn').addEventListener('click',()=>lbNav('n'));

let tx=0,ty=0;
$('lb').addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;ty=e.changedTouches[0].clientY;},{passive:true});
$('lb').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){
    lbNav(S.lb.svc==='coomer'?(dx<0?'mn':'mp'):(dx<0?'n':'p'));
  }else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>55){
    lbNav(dy<0?'n':'p');
  }
},{passive:true});

let wt;
$('lb').addEventListener('wheel',e=>{
  if(!S.lb.open||e.target.closest('#lbPanel'))return;
  if(Math.abs(e.deltaY)<15||wt)return;
  wt=setTimeout(()=>wt=null,520);
  lbNav(e.deltaY>0?'n':'p');
},{passive:true});

document.addEventListener('keydown',e=>{
  if(!S.lb.open)return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft')lbNav(S.lb.svc==='coomer'?'mp':'p');
  if(e.key==='ArrowRight')lbNav(S.lb.svc==='coomer'?'mn':'n');
  if(e.key==='ArrowUp'||e.key==='w')lbNav('p');
  if(e.key==='ArrowDown'||e.key==='s')lbNav('n');
});

// ── BOOTSTRAP ────────────────────────────────────────────
async function boot() {
  bindServerModal();
  await loadCreators();

  const params = new URLSearchParams(window.location.search);
  const svc = params.get('service');
  const creatorId = params.get('creator');
  const postId = params.get('post');

  if (svc && creatorId) {
    let cObj = S.allCreators.find(c => c.id === creatorId && (svc === 'leak' ? c.svc === 'leak' : c.coomerSvc === svc));
    if (!cObj) cObj = { id: creatorId, name: creatorId, svc: svc === 'leak' ? 'leak' : 'coomer', coomerSvc: svc };
    
    await loadProfile(cObj, true);

    if (postId) {
       const idx = S.pMedias.findIndex(m => m.id === postId || m.file_path?.includes(postId));
       if (idx >= 0) {
         if (cObj.svc === 'leak') openLBLeak(S.pMedias, idx, cObj, true);
         else openLBCoomer(S.pMedias, idx, cObj, true);
       }
    }
  } else {
    showHome(true);
  }
}

boot();
</script>
